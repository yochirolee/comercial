# Solo base de datos para desarrollo local. Desde el directorio backend:
#   docker compose --env-file docker/compose.env up -d db
# Luego: npm run db:push && npm run db:seed
# DATABASE_URL en .env debe usar localhost:5433 (mapeo host:contenedor).

services:
  db:
    restart: unless-stopped
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: zas
      POSTGRES_PASSWORD: zas
      POSTGRES_DB: zas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zas -d zas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
